name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install latest Clang
        run: sudo apt-get install -y clang-19 lld-19 clang-tools-19

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: ./build/tests/test_pfadfinder

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find VsDevCmd.bat
        id: find_vs
        shell: cmd
        run: |
          for /f "delims=" %%i in ('dir /b /s "VsDevCmd.bat" 2^>nul') do (
            echo "path=%%i" >> $GITHUB_OUTPUT
            goto found
          )
          :found

      - name: Configure, Build and Test
        shell: cmd
        run: |
          call "${{ steps.find_vs.outputs.path }}"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release
          ./build/Release/tests/test_pfadfinder.exe
