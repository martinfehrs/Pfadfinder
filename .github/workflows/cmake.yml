# This starter workflow is for a CMake project running on multiple platforms.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-24.04, windows-2022, macos-15]
        build_type: [Release]
        c_compiler: [clang, cl]
        generator: [Ninja, "Visual Studio 17 2022"]
        include:
          - os: ubuntu-24.04
            c_compiler: clang
            cpp_compiler: clang++
            generator: Ninja
          - os: windows-2022
            c_compiler: cl
            cpp_compiler: cl
            generator: "Visual Studio 17 2022"
          - os: macos-15
            c_compiler: clang
            cpp_compiler: clang++
            generator: Ninja
        exclude:
          - os: ubuntu-24.04
            c_compiler: cl
          - os: ubuntu-24.04
            generator: "Visual Studio 17 2022"
          - os: windows-2022
            c_compiler: clang
          - os: windows-2022
            generator: Ninja
          - os: macos-15
            c_compiler: cl
          - os: macos-15
            generator: "Visual Studio 17 2022"

    steps:
    - uses: actions/checkout@v4

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install llvm@19
        brew link llvm@19
        echo "$(brew --prefix llvm@19)/bin" >> $GITHUB_PATH

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build clang-19 clang-tools-19
	sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100 --slave /usr/bin/clang++ clang++ /usr/bin/clang++-19

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -G "${{ matrix.generator }}"
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      shell: bash
      run: ctest --build-config ${{ matrix.build_type }}
