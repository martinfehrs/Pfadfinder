name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install latest Clang
        run: sudo apt-get install -y clang-19 lld-19 clang-tools-19

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: ./build/tests/test_pfadfinder

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure, Build and Test
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" ||^
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat" ||^
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release
          ./build/Release/tests/test_pfadfinder.exe
