name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install latest Clang
        run: sudo apt-get install -y clang-19 lld-19 clang-tools-19

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: ./build/tests/test_pfadfinder

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S . -B build \
          -DCMAKE_C_COMPILER=cl \
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ./build/Release/tests/test_pfadfinder.exe
